<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIHA - ありがとうございます</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: #fafaf8;
  color: #1a1a1a;
  min-height: 100vh;
}

.wrap {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding: 12px 28px 64px;
  background: #fff;
  min-height: 100vh;
  text-align: center;
}

.top-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, transparent, #D4AF6A);
  margin: 0 auto 28px;
}

.salon-name {
  font-size: 11px;
  letter-spacing: 0.45em;
  color: #B8963E;
  font-weight: 100;
  margin-bottom: 32px;
}

.divider-gold {
  width: 48px;
  height: 1px;
  background: #D4AF6A;
  margin: 0 auto 32px;
}

.thank-en {
  font-size: 36px;
  letter-spacing: 0.18em;
  color: #B8963E;
  font-weight: 100;
  font-style: italic;
  margin-bottom: 8px;
}

.thank-ja {
  font-size: 13px;
  letter-spacing: 0.22em;
  color: #888;
  margin-bottom: 36px;
}

.message {
  font-size: 11px;
  color: #5c5c5c;
  line-height: 2.2;
  letter-spacing: 0.04em;
  margin-bottom: 48px;
}

.divider-light {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, #e8e0cc, transparent);
  margin: 0 auto 40px;
}

.salon-info {
  font-size: 11px;
  color: #b0a898;
  letter-spacing: 0.1em;
  line-height: 2.2;
}

.bottom-line {
  width: 1px;
  height: 48px;
  background: linear-gradient(to bottom, #D4AF6A, transparent);
  margin: 40px auto 0;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="divider-gold"></div>

  <div class="thank-en">Thank you</div>

  <div class="message">
    カウンセリングシートのご記入をありがとうございました。<br><br>
    当日、担当者が内容を確認の上、丁寧にカウンセリングいたします。<br>
    ご来店を心よりお待ちしております。
  </div>

  <div class="divider-light"></div>

  <div class="salon-info">
    ARIHA Holistic Beauty Salon<br>
    銀座・立川
  </div>

</div>
</body>
</html>
